name: xml-to-json
version: v0.2.0
description: |
  Convert XML payloads to JSON in request and/or response flows. Use this only when the selected flow payload is XML, because non-XML inputs fail transformation.

parameters:
  type: object
  additionalProperties: false
  properties:
    onRequestFlow:
      type: boolean
      default: false
      description: Convert request payloads from XML to JSON before forwarding upstream when enabled.
    onResponseFlow:
      type: boolean
      default: false
      description: Convert response payloads from XML to JSON before returning to the client when enabled.

systemParameters:
  type: object
  properties: {}
