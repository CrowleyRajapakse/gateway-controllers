name: add-headers
version: v0.2.0
description: |
  Add configured headers to requests and/or responses, and append values when the header already exists.

parameters:
  type: object
  properties:
    requestHeaders:
      type: array
      description: Array of headers that need to be added to the request during request phase. At least
        one of requestHeaders or responseHeaders must be specified.
      items:
        type: object
        properties:
          name:
            type: string
            description: Header name (case-insensitive)
            minLength: 1
            maxLength: 256
            pattern: "^[a-zA-Z0-9-_]+$"
          value:
            type: string
            description: Header value
            maxLength: 8192
        required:
        - name
        - value
        resolve:
        - value
    responseHeaders:
      type: array
      description: Array of headers that need to be added to the response during response phase. At
        least one of requestHeaders or responseHeaders must be specified.
      items:
        type: object
        properties:
          name:
            type: string
            description: Header name (case-insensitive)
            minLength: 1
            maxLength: 256
            pattern: "^[a-zA-Z0-9-_]+$"
          value:
            type: string
            description: Header value
            maxLength: 8192
        required:
        - name
        - value
        resolve:
        - value
  anyOf:
    - required: [requestHeaders]
    - required: [responseHeaders]

systemParameters:
  type: object
  properties: {}
