name: json-to-xml
version: v0.2.0
description: |
  Convert JSON payloads to XML in request and/or response flows. Use this only when the selected flow payload is JSON, because non-JSON inputs fail transformation.

parameters:
  type: object
  additionalProperties: false
  properties:
    onRequestFlow:
      type: boolean
      default: false
      description: Convert request payloads from JSON to XML before forwarding upstream when enabled.
    onResponseFlow:
      type: boolean
      default: false
      description: Convert response payloads from JSON to XML before returning to the client when enabled.

systemParameters:
  type: object
  properties: {}
